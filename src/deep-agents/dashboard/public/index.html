<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Deep Agents Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      background: #0d0d0f;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid #1e293b;
      background: #0d0d0f;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #38bdf8;
      letter-spacing: 0.05em;
    }

    header .badge {
      font-size: 11px;
      background: #1e293b;
      color: #94a3b8;
      padding: 2px 8px;
      border-radius: 999px;
    }

    .toolbar {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    button {
      font-family: inherit;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      cursor: pointer;
    }

    button:hover { background: #334155; }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: calc(100vh - 57px);
    }

    .sidebar {
      border-right: 1px solid #1e293b;
      overflow-y: auto;
      padding: 12px 0;
    }

    .sidebar-title {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 16px 8px;
    }

    .checkpoint-item {
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }

    .checkpoint-item:hover { background: #131924; }

    .checkpoint-item.active {
      border-left-color: #38bdf8;
      background: #131924;
    }

    .checkpoint-item .cp-id {
      font-size: 11px;
      color: #64748b;
    }

    .checkpoint-item .cp-agent {
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f0;
      margin: 2px 0;
    }

    .checkpoint-item .cp-meta {
      font-size: 11px;
      color: #64748b;
    }

    .main {
      overflow-y: auto;
      padding: 24px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #475569;
      gap: 8px;
    }

    .empty-state .icon { font-size: 32px; }
    .empty-state p { font-size: 13px; }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .metric-card {
      background: #131924;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 16px;
    }

    .metric-card .label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .metric-card .value {
      font-size: 22px;
      font-weight: 700;
      color: #38bdf8;
    }

    .section-title {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid #1e293b;
    }

    .json-view {
      background: #0a0e17;
      border: 1px solid #1e293b;
      border-radius: 6px;
      padding: 16px;
      font-size: 12px;
      line-height: 1.6;
      color: #94a3b8;
      white-space: pre-wrap;
      word-break: break-all;
      overflow-x: auto;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>Nexus Deep Agents</h1>
    <span class="badge" id="count-badge">0 checkpoints</span>
    <div class="toolbar">
      <button id="btn-refresh">Refresh</button>
      <button id="btn-clear">Clear</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-title">Execution History</div>
      <div id="checkpoint-list"></div>
    </aside>

    <main class="main" id="main-content">
      <div class="empty-state">
        <div class="icon">◎</div>
        <p>No checkpoint selected.</p>
        <p>Run a deep-agents session to see execution traces here.</p>
      </div>
    </main>
  </div>

  <script>
    let history = [];
    let selectedId = null;

    async function fetchHistory() {
      const res = await fetch('/api/execution-history');
      history = await res.json();
      renderList();
      updateBadge();
    }

    async function clearHistory() {
      await fetch('/api/clear', { method: 'POST' });
      history = [];
      selectedId = null;
      renderList();
      renderEmpty();
      updateBadge();
    }

    function updateBadge() {
      document.getElementById('count-badge').textContent =
        `${history.length} checkpoint${history.length !== 1 ? 's' : ''}`;
    }

    function renderList() {
      const el = document.getElementById('checkpoint-list');
      if (history.length === 0) {
        el.innerHTML = '<div style="padding:16px;font-size:12px;color:#475569">No checkpoints yet.</div>';
        return;
      }
      el.innerHTML = history.map((s, i) => `
        <div class="checkpoint-item ${i === selectedId ? 'active' : ''}" data-id="${i}">
          <div class="cp-id">#${i}</div>
          <div class="cp-agent">${s.current_agent ?? 'unknown'}</div>
          <div class="cp-meta">
            ${s.phase ? `[${s.phase}]  ` : ''}
            $${(s.cost_usd ?? 0).toFixed(4)}  &middot;
            ${s.tokens_used ?? 0} tokens
          </div>
        </div>
      `).join('');

      el.querySelectorAll('.checkpoint-item').forEach(item => {
        item.addEventListener('click', () => {
          selectedId = parseInt(item.dataset.id);
          renderList();
          renderDetail(history[selectedId], selectedId);
        });
      });
    }

    function renderEmpty() {
      document.getElementById('main-content').innerHTML = `
        <div class="empty-state">
          <div class="icon">◎</div>
          <p>No checkpoint selected.</p>
          <p>Run a deep-agents session to see execution traces here.</p>
        </div>`;
    }

    function renderDetail(state, id) {
      const elapsed = state.wall_clock_seconds ?? 0;
      const m = Math.floor(elapsed / 60);
      const s = elapsed % 60;
      const elapsedStr = m > 0 ? `${m}m ${s}s` : `${s}s`;

      document.getElementById('main-content').innerHTML = `
        <div class="section-title">Checkpoint #${id} — ${state.current_agent ?? 'unknown'}</div>
        <div class="detail-grid">
          <div class="metric-card">
            <div class="label">Wall Clock</div>
            <div class="value">${elapsedStr}</div>
          </div>
          <div class="metric-card">
            <div class="label">Cost</div>
            <div class="value">$${(state.cost_usd ?? 0).toFixed(4)}</div>
          </div>
          <div class="metric-card">
            <div class="label">Tokens</div>
            <div class="value">${(state.tokens_used ?? 0).toLocaleString()}</div>
          </div>
          <div class="metric-card">
            <div class="label">Checkpoints</div>
            <div class="value">${state.checkpoint_count ?? 0}</div>
          </div>
        </div>
        <div class="section-title" style="margin-top:8px">Raw State</div>
        <div class="json-view">${JSON.stringify(state, null, 2)}</div>
      `;
    }

    document.getElementById('btn-refresh').addEventListener('click', fetchHistory);
    document.getElementById('btn-clear').addEventListener('click', clearHistory);

    // Poll every 3 seconds
    fetchHistory();
    setInterval(fetchHistory, 3000);
  </script>
</body>
</html>
